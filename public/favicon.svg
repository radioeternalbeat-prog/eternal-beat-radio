<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa44;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="#0d0d0d"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.5"/>
  <circle cx="50" cy="50" r="25" fill="url(#grad)" filter="url(#glow)"/>
  <text x="50" y="57" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">EB</text>
</svg>
